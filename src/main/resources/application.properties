
# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/hivtb_db
spring.datasource.username=postgres
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA and Hibernate Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Application Configuration
spring.application.name=hivtb-monitoring
server.port=8080

# Docker Compose - disabled until Docker is needed
spring.docker.compose.enabled=false

# JWT Configuration
app.jwt.secret=hivtb2026SecretKeyForJWTTokenGenerationMustBeLongEnough
app.jwt.expiration=900000
app.jwt.refresh-expiration=604800000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
