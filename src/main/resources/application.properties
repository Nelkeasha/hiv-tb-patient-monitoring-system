
# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hivtb_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:12345}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA and Hibernate Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=false

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Application Configuration
spring.application.name=hivtb-monitoring
server.port=${PORT:8080}

# Docker Compose - disabled until Docker is needed
spring.docker.compose.enabled=false

# JWT Configuration
app.jwt.secret=${JWT_SECRET:hivtb2026SecretKeyForJWTTokenGenerationMustBeLongEnough}
app.jwt.expiration=28800000
app.jwt.refresh-expiration=604800000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Email (SMTP) Configuration — Update 5
# Set MAIL_ENABLED=true in Render env vars when ready for production email
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
app.mail.from=${MAIL_FROM:noreply@dreammedical.rw}
app.mail.enabled=${MAIL_ENABLED:false}

# Async execution for non-blocking notification dispatch
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=100

# Scheduling (LtfuScheduler, MissedDoseScheduler)
spring.task.scheduling.pool.size=4

# Firebase Cloud Messaging — Update 5
# Set FIREBASE_SERVICE_ACCOUNT_JSON on Render with the full service account JSON string.
# Leave empty to disable FCM (app runs normally without push notifications).
firebase.service-account-json=${FIREBASE_SERVICE_ACCOUNT_JSON:}
